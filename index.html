<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Power Tree Simulator</title>
  <script src="https://unpkg.com/cytoscape@3.23.0/dist/cytoscape.min.js"></script>
  <style>
    :root {
      --bg:           #0f0f1a;
      --panel-bg:     rgba(15,15,28,0.97);
      --panel-border: rgba(255,255,255,0.10);
      --text:         #e8e8f0;
      --text-sub:     #888;
      --hint:         #555;
      --status-bg:    rgba(15,15,28,0.93);
      --tip-bg:       rgba(5,5,15,0.97);
      --input-bg:     rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.18);
      --btn-bg:       rgba(255,255,255,0.08);
      --btn-hover:    rgba(255,255,255,0.15);
      --list-hover:   rgba(255,255,255,0.05);
      --scrollbar:    rgba(255,255,255,0.12);
      --accent:       #00d4aa;
      --accent2:      #f1c40f;
    }
    [data-theme="light"] {
      --bg:           #f0f2f8;
      --panel-bg:     rgba(255,255,255,0.98);
      --panel-border: rgba(0,0,0,0.10);
      --text:         #1a1a2e;
      --text-sub:     #555;
      --hint:         #aaa;
      --status-bg:    rgba(255,255,255,0.95);
      --tip-bg:       rgba(10,10,25,0.95);
      --input-bg:     rgba(0,0,0,0.04);
      --input-border: rgba(0,0,0,0.16);
      --btn-bg:       rgba(0,0,0,0.05);
      --btn-hover:    rgba(0,0,0,0.11);
      --list-hover:   rgba(0,0,0,0.04);
      --scrollbar:    rgba(0,0,0,0.15);
      --accent:       #00a882;
      --accent2:      #c8a000;
    }

    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; background:var(--bg); transition:background .25s; }

    #cy    { position:absolute; inset:0; }
    #lanes { position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden; }

    /* ── 빈 화면 힌트 ── */
    #empty-hint {
      position:absolute; inset:0; z-index:5;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      pointer-events:none; gap:10px; color:var(--text-sub);
    }
    #empty-hint .icon { font-size:52px; opacity:.4; }
    #empty-hint .title { font-size:15px; opacity:.7; }
    #empty-hint .sub { font-size:12px; opacity:.4; }
    #empty-hint.hidden { display:none; }

    /* ══════════════════════════════════════
       왼쪽 패널
    ══════════════════════════════════════ */
    #list-panel {
      position:absolute; top:12px; left:12px; z-index:20;
      width:252px; max-height:calc(100vh - 80px);
      background:var(--panel-bg); border:1px solid var(--panel-border);
      border-radius:14px; box-shadow:0 6px 30px rgba(0,0,0,.45);
      display:flex; flex-direction:column; color:var(--text); overflow:hidden;
    }

    #list-header {
      padding:11px 13px 9px; border-bottom:1px solid var(--panel-border); flex-shrink:0;
    }
    #lh-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    #lh-top .title { font-size:13px; font-weight:700; letter-spacing:.3px; }

    .hbtn {
      font-size:10px; cursor:pointer;
      background:var(--btn-bg); border:1px solid var(--panel-border);
      border-radius:10px; padding:2px 9px; color:var(--text-sub);
      transition:background .15s, color .15s;
    }
    .hbtn:hover { background:var(--btn-hover); color:var(--text); }

    #search-wrap { position:relative; display:flex; align-items:center; }
    #search-input {
      width:100%; padding:6px 28px 6px 10px;
      background:var(--input-bg); border:1px solid var(--input-border);
      border-radius:9px; color:var(--text); font-size:12px; outline:none;
      transition:border-color .15s;
    }
    #search-input:focus { border-color:var(--accent); }
    #search-input::placeholder { color:var(--text-sub); }
    #search-clear {
      position:absolute; right:7px; cursor:pointer; font-size:12px;
      color:var(--text-sub); display:none; background:none; border:none; line-height:1;
    }

    /* 드롭다운 */
    #search-dropdown {
      display:none; margin-top:4px;
      background:var(--panel-bg); border:1px solid var(--panel-border);
      border-radius:9px; max-height:200px; overflow-y:auto;
    }
    #search-dropdown::-webkit-scrollbar { width:4px; }
    #search-dropdown::-webkit-scrollbar-thumb { background:var(--scrollbar); border-radius:2px; }
    .dd-item {
      display:flex; align-items:center; gap:7px;
      padding:5px 10px; margin:2px 4px; border-radius:7px;
      cursor:pointer; font-size:12px; transition:background .1s;
    }
    .dd-item:hover { background:var(--list-hover); }
    .dd-label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .dd-badge {
      font-size:9px; border-radius:4px; padding:1px 5px;
      background:var(--btn-bg); color:var(--text-sub); flex-shrink:0;
    }
    .dd-hint { font-size:11px; color:var(--hint); padding:8px 12px; text-align:center; }

    /* ── 소팅 탭 ── */
    #sort-bar {
      display:flex; align-items:center; gap:4px;
      padding:7px 10px 6px; border-bottom:1px solid var(--panel-border);
      flex-shrink:0; overflow-x:auto; gap:4px;
    }
    #sort-bar::-webkit-scrollbar { height:3px; }
    #sort-bar::-webkit-scrollbar-thumb { background:var(--scrollbar); border-radius:2px; }
    .sort-label { font-size:10px; color:var(--hint); white-space:nowrap; margin-right:2px; flex-shrink:0; }
    .sort-tab {
      font-size:10px; cursor:pointer; white-space:nowrap; flex-shrink:0;
      background:var(--btn-bg); border:1px solid var(--panel-border);
      border-radius:8px; padding:2px 8px; color:var(--text-sub);
      transition:all .15s;
    }
    .sort-tab:hover { background:var(--btn-hover); color:var(--text); }
    .sort-tab.active {
      background:var(--accent); border-color:var(--accent);
      color:#fff; font-weight:700;
    }

    /* ── 노드 리스트 ── */
    #node-list { overflow-y:auto; flex:1; padding:4px 0; }
    #node-list::-webkit-scrollbar { width:4px; }
    #node-list::-webkit-scrollbar-thumb { background:var(--scrollbar); border-radius:2px; }

    .grp-header {
      padding:6px 12px 3px; font-size:10px; font-weight:700;
      letter-spacing:.9px; text-transform:uppercase;
      color:var(--text-sub); display:flex; align-items:center;
      justify-content:space-between; cursor:pointer; user-select:none;
    }
    .grp-header:hover { color:var(--text); }
    .grp-count {
      font-size:9px; background:var(--btn-bg);
      border-radius:6px; padding:1px 5px;
    }

    .node-row {
      display:flex; align-items:center; gap:7px;
      padding:3px 12px; margin:0 4px; border-radius:7px;
      cursor:pointer; font-size:12px; transition:background .1s;
    }
    .node-row:hover { background:var(--list-hover); }
    .node-row.active-node { background:rgba(0,212,170,.10); }
    .node-row.active-node .nr-label { color:var(--accent); font-weight:600; }
    .node-row.root-node   { background:rgba(241,196,15,.10); }
    .node-row.root-node   .nr-label { color:var(--accent2); font-weight:700; }
    .nr-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .nr-label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .nr-badge {
      font-size:9px; border-radius:4px; padding:1px 5px;
      background:var(--btn-bg); color:var(--text-sub); flex-shrink:0;
    }

    #list-summary {
      padding:5px 12px; font-size:10px; color:var(--hint);
      border-top:1px solid var(--panel-border); flex-shrink:0; display:none;
    }

    /* ══════════════════════════════════════
       오른쪽 컨트롤
    ══════════════════════════════════════ */
    #ctrl-panel {
      position:absolute; top:12px; right:12px; z-index:20;
      background:var(--panel-bg); border:1px solid var(--panel-border);
      border-radius:14px; padding:12px 14px;
      box-shadow:0 6px 30px rgba(0,0,0,.45);
      color:var(--text); min-width:186px;
    }
    .cp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px; }
    .cp-header h3 { font-size:14px; font-weight:700; }
    #theme-toggle {
      cursor:pointer; background:var(--btn-bg); border:1px solid var(--panel-border);
      border-radius:20px; padding:3px 10px; font-size:11px; color:var(--text);
      transition:background .15s; white-space:nowrap;
    }
    #theme-toggle:hover { background:var(--btn-hover); }
    .legend { font-size:11px; line-height:2.1; }
    .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align:middle; }
    .divider { border:none; border-top:1px solid var(--panel-border); margin:8px 0; }
    .hint { font-size:10px; color:var(--hint); margin-top:4px; line-height:1.7; }

    /* 뒤로가기 */
    #back-btn {
      position:absolute; bottom:52px; left:50%;
      transform:translateX(-50%); z-index:20;
      display:none;
      background:var(--panel-bg); border:1px solid var(--panel-border);
      border-radius:20px; padding:6px 20px;
      font-size:12px; color:var(--text-sub); cursor:pointer;
      box-shadow:0 2px 10px rgba(0,0,0,.25); transition:all .15s;
    }
    #back-btn:hover { background:var(--btn-hover); color:var(--text); }
    #back-btn.visible { display:block; }

    /* 툴팁 */
    #tooltip {
      position:absolute; z-index:30; display:none;
      background:var(--tip-bg); color:#eee;
      font-size:12px; padding:9px 13px; border-radius:9px;
      pointer-events:none; max-width:260px; line-height:1.75;
      box-shadow:0 4px 18px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,0.10);
    }
    /* 상태바 */
    #statusbar {
      position:absolute; bottom:12px; left:50%;
      transform:translateX(-50%); z-index:20;
      background:var(--status-bg); padding:6px 20px; border-radius:20px;
      font-size:12px; color:var(--text-sub);
      box-shadow:0 2px 10px rgba(0,0,0,.25);
      white-space:nowrap; border:1px solid var(--panel-border);
    }
    /* 로딩 */
    #loading {
      position:absolute; inset:0; z-index:100; background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:15px; color:var(--text-sub); gap:14px;
    }
    #loading.hidden { display:none; }
    .spinner {
      width:40px; height:40px; border:4px solid #333; border-top-color:var(--accent);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div>스프레드시트 연결 중…</div></div>
<div id="lanes"></div>
<div id="cy"></div>

<div id="empty-hint">
  <div class="icon">⚡</div>
  <div class="title">Power Tree Explorer</div>
  <div class="sub">왼쪽 검색창에서 노드를 검색하세요</div>
</div>

<!-- 왼쪽 패널 -->
<div id="list-panel">
  <div id="list-header">
    <div id="lh-top">
      <span class="title">🔍 노드 탐색</span>
      <button class="hbtn" id="btn-reset">초기화</button>
    </div>
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="노드 검색…" autocomplete="off">
      <button id="search-clear">✕</button>
    </div>
    <div id="search-dropdown"></div>
  </div>

  <div id="sort-bar">
    <span class="sort-label">그룹:</span>
  </div>

  <div id="node-list"></div>
  <div id="list-summary"></div>
</div>

<!-- 오른쪽 컨트롤 -->
<div id="ctrl-panel">
  <div class="cp-header">
    <h3>⚡ Power Tree</h3>
    <button id="theme-toggle">🌙 다크</button>
  </div>
  <div class="legend">
    <div><span class="dot" style="background:#3498db"></span>EDB / EGEN</div>
    <div><span class="dot" style="background:#9b59b6"></span>ESB 직결</div>
    <div><span class="dot" style="background:#2ecc40"></span>전원 공급 중</div>
    <div><span class="dot" style="background:#ff4136"></span>차단기 개방</div>
    <div><span class="dot" style="background:#334"></span>전원 없음</div>
  </div>
  <hr class="divider">
  <div class="hint">
    노드 클릭 → 연결 확장<br>
    더블클릭 → 차단기 토글<br>
    스크롤 → 줌 · 드래그 → 이동
  </div>
</div>

<button id="back-btn">← 이전 단계</button>
<div id="tooltip"></div>
<div id="statusbar">로딩 중…</div>

<script>
/* ══════════════════════════════════════════════════════
   GAS URL
══════════════════════════════════════════════════════ */
const GAS_URL = "https://script.google.com/macros/s/AKfycbzHbyYrYIfs5TdBV25xSbwQ9t_INk-OWHs0OzczLyM-PJOv3ZovOix7hGnfhD8NWvZ-/exec";

/* ── Tier 정의 ── */
const TIER_INFO = [
  { label:'EGEN/EDB',      color:'#3498db', bgD:'rgba(52,152,219,0.07)',  bgL:'rgba(52,152,219,0.10)' },
  { label:'ESB-직결',      color:'#9b59b6', bgD:'rgba(155,89,182,0.06)', bgL:'rgba(155,89,182,0.09)' },
  { label:'ESB/EXFMR/JB',  color:'#27ae60', bgD:'rgba(46,204,113,0.06)', bgL:'rgba(46,204,113,0.09)' },
  { label:'ESB/EXFMR',     color:'#1abc9c', bgD:'rgba(26,188,156,0.06)', bgL:'rgba(26,188,156,0.09)' },
  { label:'LOAD',          color:'#e67e22', bgD:'rgba(243,156,18,0.05)', bgL:'rgba(243,156,18,0.08)' },
  { label:'RME/단독',      color:'#e74c3c', bgD:'rgba(231,76,60,0.05)',  bgL:'rgba(231,76,60,0.08)'  },
];

/* ── 레이아웃 상수 ── */
const RADIAL_BASE   = 170;   // 방사형 기본 반경 (px, graph coords)
const RADIAL_EXTRA  = 90;    // 12개 초과 시 반경 추가
const NODE_GAP_X    = 130;
const TIER_GAP_Y    = 185;
const TOP_OFFSET    = 80;
const SOLO_ROW_GAP  = 120;

/* ── 전역 상태 ── */
let cy             = null;
let rawElements    = null;
let isDark         = false;
let colCount       = 12;
let soloRows       = 3;

let adjMap         = {};   // id → { out:[ids], in:[ids] }
let visibleSet     = new Set();
let expandHistory  = [];   // stack of {visibleSet, focusId, positions}
let currentFocusId = null;
let activeGroup    = 'ALL';

const tooltip   = document.getElementById('tooltip');
const statusbar = document.getElementById('statusbar');
const loading   = document.getElementById('loading');
const emptyHint = document.getElementById('empty-hint');
const backBtn   = document.getElementById('back-btn');

/* ══════════════════════════════════════════════════════
   테마
══════════════════════════════════════════════════════ */
document.getElementById('theme-toggle').addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = isDark ? '🌙 다크' : '☀️ 라이트';
  if (cy) { applyCyTheme(); drawLanes(); }
});

/* ══════════════════════════════════════════════════════
   진입점
══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const res  = await fetch(GAS_URL, { redirect:'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    if (text.trim().startsWith('<'))
      throw new Error('GAS HTML 반환 → 배포 설정에서\n"액세스: 모든 사용자(익명 포함)"으로 재배포 필요');
    rawElements = JSON.parse(text);
    buildAdjMap(rawElements);
    loading.classList.add('hidden');
    initGraph(rawElements);
    buildSortTabs();
    buildNodeList('ALL');
    initSearch();
    backBtn.addEventListener('click', stepBack);
    document.getElementById('btn-reset').addEventListener('click', resetAll);
  } catch (err) {
    loading.innerHTML = `<div style="color:#e74c3c;text-align:center;max-width:320px;line-height:1.7">
      ❌ 데이터 로드 실패<br><br><b>${err.message.replace(/\n/g,'<br>')}</b></div>`;
    console.error(err);
  }
});

/* ══════════════════════════════════════════════════════
   인접 맵: adjMap[id] = { out:[...], in:[...] }
══════════════════════════════════════════════════════ */
function buildAdjMap(elements) {
  adjMap = {};
  elements.nodes.forEach(n => { adjMap[n.data.id] = { out:[], in:[] }; });
  elements.edges.forEach(e => {
    const s = e.data.source, t = e.data.target;
    if (adjMap[s] && !adjMap[s].out.includes(t)) adjMap[s].out.push(t);
    if (adjMap[t] && !adjMap[t].in.includes(s))  adjMap[t].in.push(s);
  });
}

/* 직접 이웃 (in + out 방향 모두) */
function directNeighbors(id) {
  const a = adjMap[id];
  if (!a) return [];
  return [...new Set([...a.out, ...a.in])];
}

/* ══════════════════════════════════════════════════════
   소팅 탭: 영문 prefix 기반 그룹
══════════════════════════════════════════════════════ */
function extractPrefix(id) {
  const m = id.match(/^([A-Za-z]+)/);
  return m ? m[1].toUpperCase() : '#';
}

function buildSortTabs() {
  const cnt = {};
  rawElements.nodes.forEach(n => {
    const p = extractPrefix(n.data.id);
    cnt[p] = (cnt[p] || 0) + 1;
  });

  // 빈도순 정렬
  const prefixes = Object.entries(cnt)
    .sort((a,b) => b[1] - a[1])
    .map(x => x[0]);

  const bar = document.getElementById('sort-bar');

  const makeTab = (key, label) => {
    const tab = document.createElement('button');
    tab.className = 'sort-tab' + (key === 'ALL' ? ' active' : '');
    tab.dataset.key = key;
    tab.textContent = label;
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeGroup = key;
      buildNodeList(key);
    });
    return tab;
  };

  bar.appendChild(makeTab('ALL', `전체(${rawElements.nodes.length})`));
  prefixes.forEach(p => {
    bar.appendChild(makeTab(p, `${p}(${cnt[p]})`));
  });
}

/* ══════════════════════════════════════════════════════
   노드 리스트 빌드
══════════════════════════════════════════════════════ */
function buildNodeList(groupKey) {
  const container = document.getElementById('node-list');
  const summary   = document.getElementById('list-summary');
  container.innerHTML = '';

  let nodes = rawElements.nodes.map(n => n.data);
  if (groupKey !== 'ALL') {
    nodes = nodes.filter(d => extractPrefix(d.id) === groupKey);
  }

  // 알파벳 정렬
  nodes.sort((a, b) => a.id.localeCompare(b.id));

  // prefix 별 그룹핑
  const groups = {};
  nodes.forEach(d => {
    const p = extractPrefix(d.id);
    (groups[p] = groups[p] || []).push(d);
  });

  Object.keys(groups).sort().forEach(gk => {
    const grpNodes = groups[gk];

    const header = document.createElement('div');
    header.className = 'grp-header';
    header.innerHTML = `<span>${gk}</span><span class="grp-count">${grpNodes.length}</span>`;

    const body = document.createElement('div');
    body.dataset.grp = gk;

    grpNodes.forEach(d => body.appendChild(makeNodeRow(d)));

    header.addEventListener('click', () => {
      body.style.display = body.style.display === 'none' ? '' : 'none';
    });

    container.appendChild(header);
    container.appendChild(body);
  });

  summary.style.display = nodes.length ? 'block' : 'none';
  summary.textContent   = `${nodes.length}개 노드`;
}

function makeNodeRow(d) {
  const row  = document.createElement('div');
  row.className = 'node-row';
  row.dataset.nodeId = d.id;

  const tier  = d.tier ?? 4;
  const color = TIER_INFO[tier]?.color || '#aaa';

  const dot = document.createElement('span');
  dot.className = 'nr-dot';
  dot.style.background = color;

  const lbl = document.createElement('span');
  lbl.className = 'nr-label';
  lbl.textContent = d.id;
  lbl.title = [d.id, d.loc, d.desc].filter(Boolean).join(' | ');

  const badge = document.createElement('span');
  badge.className = 'nr-badge';
  badge.style.borderLeft = `3px solid ${color}`;
  badge.textContent = TIER_INFO[tier]?.label || `T${tier}`;

  row.appendChild(dot);
  row.appendChild(lbl);
  row.appendChild(badge);

  // 리스트 클릭 → 새 탐색 시작 (히스토리 리셋)
  row.addEventListener('click', () => expandFromNode(d.id, true));
  return row;
}

/* 리스트 하이라이트 동기화 */
function syncListHighlight(focusId, visSet) {
  document.querySelectorAll('.node-row').forEach(row => {
    const id = row.dataset.nodeId;
    row.classList.remove('active-node', 'root-node');
    if (id === focusId)          row.classList.add('root-node');
    else if (visSet && visSet.has(id)) row.classList.add('active-node');
  });
  // 스크롤: 포커스 행 보이게
  if (focusId) {
    const r = document.querySelector(`.node-row[data-node-id="${focusId}"]`);
    if (r) r.scrollIntoView({ block:'nearest', behavior:'smooth' });
  }
}

/* ══════════════════════════════════════════════════════
   그래프 초기화 (모든 노드 숨김)
══════════════════════════════════════════════════════ */
function initGraph(elements) {
  if (!elements?.nodes?.length) {
    loading.innerHTML = '<div style="color:#e67e22">⚠️ 데이터 없음</div>';
    loading.classList.remove('hidden');
    return;
  }

  const posMap = buildFullPosMap(elements);

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements,
    style: getCyStyle(),
    layout: { name:'preset', positions: node => posMap[node.id()] || { x:0, y:0 } },
    minZoom: 0.05, maxZoom: 5,
  });
  cy.container().style.background = isDark ? '#0f0f1a' : '#f0f2f8';

  cy.nodes().forEach(n => {
    n.data('is_hidden', true);
    n.data('is_breaker_closed', 1);
    n.data('is_root', n.indegree() === 0);
    n.data('is_focus', false);
  });
  cy.edges().forEach(e => e.data('is_hidden', true));

  updatePowerFlow();
  updateStatusBar();
  drawLanes();

  /* 단일 클릭 → 연결 확장 */
  cy.on('tap', 'node', evt => {
    const n = evt.target;
    if (n.data('is_hidden')) return;
    expandFromNode(n.id(), false);
  });

  /* 더블클릭 → 차단기 토글 */
  cy.on('dblclick', 'node', evt => {
    const n = evt.target;
    if (n.data('is_hidden')) return;
    n.data('is_breaker_closed', n.data('is_breaker_closed') ? 0 : 1);
    updatePowerFlow();
    updateStatusBar();
  });

  cy.on('viewport', drawLanes);

  cy.on('mouseover', 'node', evt => {
    const n = evt.target;
    if (n.data('is_hidden')) return;
    const pos = evt.renderedPosition, d = n.data();
    const tierLbl = TIER_INFO[d.tier]?.label || '';
    const st = d.is_breaker_closed
      ? (d.is_powered ? '🟢 전원 공급 중' : '⚪ 전원 없음')
      : '🔴 차단기 개방';
    const neighborCount = directNeighbors(d.id).length;
    tooltip.innerHTML =
      `<b>${d.id}</b> <span style="font-size:10px;opacity:.6">[${tierLbl}]</span><br>`+
      (d.loc  ? `📍 ${d.loc}<br>` : '')+
      (d.desc ? `📝 ${d.desc}<br>` : '')+
      (d.ckt  ? `🔌 ${d.ckt}<br>` : '')+
      `상태: ${st}<br>`+
      `<span style="font-size:10px;color:#888">연결 ${neighborCount}개 | 클릭→확장 | 더블클릭→차단기</span>`;
    Object.assign(tooltip.style,{display:'block',left:(pos.x+16)+'px',top:(pos.y-10)+'px'});
  });
  cy.on('mouseout',  'node', () => { tooltip.style.display='none'; });
  cy.on('mousemove', 'node', evt => {
    const p = evt.renderedPosition;
    Object.assign(tooltip.style,{left:(p.x+16)+'px',top:(p.y-10)+'px'});
  });
}

/* ══════════════════════════════════════════════════════
   방사형 확장
   resetHistory=true  → 히스토리 초기화 (새 검색)
   resetHistory=false → 히스토리에 현재 상태 push
══════════════════════════════════════════════════════ */
function expandFromNode(id, resetHistory) {
  if (!cy || !adjMap[id]) return;

  if (resetHistory) {
    expandHistory = [];
    visibleSet.clear();
  } else {
    // 현재 상태 저장
    expandHistory.push({
      visibleSet:    new Set(visibleSet),
      focusId:       currentFocusId,
      positions:     capturePositions(),
    });
  }

  const neighbors = directNeighbors(id);

  // 중심 노드 + 이웃을 visibleSet에 추가 (누적)
  visibleSet.add(id);
  neighbors.forEach(nid => visibleSet.add(nid));
  currentFocusId = id;

  // 방사형 위치 계산 및 배치
  applyRadialLayout(id, neighbors);

  // 표시 상태 적용
  applyVisibility();

  // 포커스 마킹
  cy.nodes().data('is_focus', false);
  cy.getElementById(id).data('is_focus', true);

  // 리스트 동기화
  syncListHighlight(id, visibleSet);

  // 카메라: 새 등장 노드들 중심으로
  const newNodeSet = new Set([id, ...neighbors]);
  setTimeout(() => {
    const targets = cy.nodes().filter(n => newNodeSet.has(n.id()) && !n.data('is_hidden'));
    if (targets.length) cy.fit(targets, 110);
  }, 60);

  emptyHint.classList.add('hidden');
  backBtn.classList.toggle('visible', expandHistory.length > 0);
  updateStatusBar();
}


 /* ══════════════════════════════════════
     
 
/* ── 방사형 배치 ── */
function applyRadialLayout(centerId, neighborIds) {
  if (!cy) return;
  const cn = cy.getElementById(centerId);

  // 중심 위치: 이미 표시 중이면 현재 위치 유지, 아니면 화면 중앙
  let cx, cy_;
  if (!cn.data('is_hidden')) {
    cx  = cn.position('x');
    cy_ = cn.position('y');
  } else {
    // 화면 중심 (graph coords)
    const ext = cy.extent();
    cx  = (ext.x1 + ext.x2) / 2;
    cy_ = (ext.y1 + ext.y2) / 2;
  }
  cn.position({ x: cx, y: cy_ });







  
  // 이웃 배치
  const count = neighborIds.length;
  if (count === 0) return;

    neighborIds.forEach((nid, i) => {
    const n = cy.getElementById(nid);
    if (!n.length || !n.data('is_hidden')) return;

    // ⬇⬇⬇ 핵심 변경 부분 ⬇⬇⬇
    const angle  = Math.PI * (i / Math.max(count - 1, 1)); // 0 ~ π
    const radius = RADIAL_BASE + Math.floor(i / 12) * RADIAL_EXTRA;

    n.position({
      x: cx + radius * Math.cos(angle - Math.PI / 2),
      y: cy_ + radius * Math.sin(angle - Math.PI / 2),
    });
  });
}

   ══════════════════════════════════════ */

//아래로 배열

function applyTreeLayoutMultiRow(centerId, neighborIds) {
  if (!cy) return;
  const cn = cy.getElementById(centerId);

  let cx, cy_;
  if (!cn.data('is_hidden')) {
    cx  = cn.position('x');
    cy_ = cn.position('y');
  } else {
    const ext = cy.extent();
    cx  = (ext.x1 + ext.x2) / 2;
    cy_ = (ext.y1 + ext.y2) / 2;
  }

  cn.position({ x: cx, y: cy_ });

  const gapX = 120;
  const gapY = 140;
  const perRow = 6; // 한 줄 최대 개수

  neighborIds.forEach((nid, i) => {
    const n = cy.getElementById(nid);
    if (!n.length || !n.data('is_hidden')) return;

    const row = Math.floor(i / perRow);
    const col = i % perRow;

    const rowCount = Math.min(perRow, neighborIds.length - row * perRow);
    const startX = cx - ((rowCount - 1) * gapX) / 2;

    n.position({
      x: startX + col * gapX,
      y: cy_ + gapY * (row + 1)
    });
  });
}

  

/* ── 현재 보이는 노드 위치 스냅샷 ── */
function capturePositions() {
  const pos = {};
  cy.nodes().filter(n => !n.data('is_hidden')).forEach(n => {
    pos[n.id()] = { x: n.position('x'), y: n.position('y') };
  });
  return pos;
}

/* ── 위치 복원 ── */
function restorePositions(positions) {
  Object.entries(positions).forEach(([id, p]) => {
    const n = cy.getElementById(id);
    if (n.length) n.position(p);
  });
}

/* ══════════════════════════════════════════════════════
   뒤로가기
══════════════════════════════════════════════════════ */
function stepBack() {
  if (!expandHistory.length) return;
  const prev = expandHistory.pop();

  visibleSet     = prev.visibleSet;
  currentFocusId = prev.focusId;
  restorePositions(prev.positions);

  applyVisibility();
  cy.nodes().data('is_focus', false);
  if (currentFocusId) cy.getElementById(currentFocusId).data('is_focus', true);

  syncListHighlight(currentFocusId, visibleSet);

  setTimeout(() => {
    const vis = cy.nodes().filter(n => !n.data('is_hidden'));
    if (vis.length) cy.fit(vis, 110);
  }, 60);

  if (visibleSet.size === 0) emptyHint.classList.remove('hidden');
  backBtn.classList.toggle('visible', expandHistory.length > 0);
  updateStatusBar();
}

/* ══════════════════════════════════════════════════════
   초기화
══════════════════════════════════════════════════════ */
function resetAll() {
  visibleSet.clear();
  expandHistory  = [];
  currentFocusId = null;

  if (cy) {
    cy.nodes().forEach(n => { n.data('is_hidden', true); n.data('is_focus', false); });
    cy.edges().forEach(e => e.data('is_hidden', true));
    updatePowerFlow();
    updateStatusBar();
  }

  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-dropdown').innerHTML  = '';
  document.getElementById('search-dropdown').style.display = 'none';

  syncListHighlight(null, new Set());
  emptyHint.classList.remove('hidden');
  backBtn.classList.remove('visible');
}

/* ══════════════════════════════════════════════════════
   표시 상태 적용
══════════════════════════════════════════════════════ */
function applyVisibility() {
  if (!cy) return;
  cy.nodes().forEach(n => n.data('is_hidden', !visibleSet.has(n.id())));
  cy.edges().forEach(e => {
    e.data('is_hidden', e.source().data('is_hidden') || e.target().data('is_hidden'));
  });
  updatePowerFlow();
}

/* ══════════════════════════════════════════════════════
   BFS 전력 흐름
══════════════════════════════════════════════════════ */
function updatePowerFlow() {
  if (!cy) return;
  cy.nodes().data('is_powered', false);
  cy.edges().data('is_live',    false);
  const roots = cy.nodes('[is_root]').filter(n => n.data('is_breaker_closed')===1 && !n.data('is_hidden'));
  roots.data('is_powered', true);
  const queue = roots.toArray();
  while (queue.length) {
    const curr = queue.shift();
    if (!curr.data('is_breaker_closed') || curr.data('is_hidden')) continue;
    curr.outgoers('edge').forEach(edge => {
      if (edge.data('is_hidden')) return;
      const tgt = edge.target();
      if (!tgt.data('is_breaker_closed') || tgt.data('is_hidden')) return;
      edge.data('is_live', true);
      if (!tgt.data('is_powered')) { tgt.data('is_powered', true); queue.push(tgt); }
    });
  }
}

/* ══════════════════════════════════════════════════════
   상태바
══════════════════════════════════════════════════════ */
function updateStatusBar() {
  if (!cy) return;
  const shown   = cy.nodes().filter(n => !n.data('is_hidden')).length;
  const total   = cy.nodes().length;
  const powered = cy.nodes('[?is_powered]').filter(n => !n.data('is_hidden')).length;
  const open    = cy.nodes('[is_breaker_closed=0]').filter(n => !n.data('is_hidden')).length;
  statusbar.textContent =
    `표시 ${shown} / 전체 ${total} | 🟢 전원 ${powered}` +
    (open ? ` | 🔴 개방 ${open}` : '');
}

/* ══════════════════════════════════════════════════════
   레인 배경
══════════════════════════════════════════════════════ */
function drawLanes() {
  if (!cy) return;
  const c  = document.getElementById('lanes');
  c.innerHTML = '';
  const bc = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  TIER_INFO.forEach((info, tier) => {
    const cyY  = TOP_OFFSET + tier * TIER_GAP_Y;
    const sTop = cy.zoom() * (cyY - TIER_GAP_Y/2) + cy.pan().y;
    const sH   = cy.zoom() * TIER_GAP_Y;
    const div  = document.createElement('div');
    Object.assign(div.style, {
      position:'absolute', left:'0', right:'0',
      top:sTop+'px', height:Math.max(sH,0)+'px',
      background:isDark?info.bgD:info.bgL,
      borderTop:`1px dashed ${bc}`,
      display:'flex', alignItems:'center', paddingLeft:'10px',
      fontSize:'10px', fontWeight:'bold', letterSpacing:'1px',
      opacity:'0.5', color:info.color, pointerEvents:'none',
    });
    div.textContent = info.label;
    c.appendChild(div);
  });
}

/* ══════════════════════════════════════════════════════
   전체 위치 맵 (초기 preset용)
══════════════════════════════════════════════════════ */
function buildFullPosMap(elements) {
  const posMap = {};
  const deg    = {};
  elements.nodes.forEach(n => { deg[n.data.id] = 0; });
  elements.edges.forEach(e => {
    deg[e.data.source] = (deg[e.data.source]||0)+1;
    deg[e.data.target] = (deg[e.data.target]||0)+1;
  });

  const egenList=[], esb1Nodes=[], soloNodes=[], normalNodes={};
  elements.nodes.forEach(n => {
    const d = n.data;
    if      (d.tier===0)                         egenList.push(d.id);
    else if (d.tier===1)                         esb1Nodes.push(d.id);
    else if (d.tier===5 && (deg[d.id]||0)<=1)   soloNodes.push(d.id);
    else                                         (normalNodes[d.tier]=normalNodes[d.tier]||[]).push(d.id);
  });

  const tierList = Object.keys(normalNodes).map(Number).sort((a,b)=>a-b);
  const maxNT    = tierList.length ? Math.max(...tierList) : 4;
  const span     = (colCount-1)*NODE_GAP_X;

  // Row 0: EGEN/EDB
  { const y=TOP_OFFSET, half=Math.ceil(egenList.length/2);
    egenList.slice(0,half).forEach((id,i)=>{ posMap[id]={x:-span/2+i*NODE_GAP_X, y}; });
    egenList.slice(half).forEach((id,i)=>{ const r=egenList.length-half;
      posMap[id]={x:span/2-(r-1-i)*NODE_GAP_X, y}; }); }
  // Row 1: ESB 직결
  { const y=TOP_OFFSET+TIER_GAP_Y, tot=(esb1Nodes.length-1)*NODE_GAP_X;
    esb1Nodes.forEach((id,i)=>{ posMap[id]={x:i*NODE_GAP_X-tot/2, y}; }); }
  // Row 2+: normal
  tierList.forEach(tier => {
    const ids=normalNodes[tier], baseY=TOP_OFFSET+tier*TIER_GAP_Y, sg=TIER_GAP_Y*0.55;
    ids.forEach((id,i)=>{
      const row=Math.floor(i/colCount), col=i%colCount;
      const rowLen=Math.min(colCount, ids.length-row*colCount);
      posMap[id]={ x:-(rowLen-1)*NODE_GAP_X/2+col*NODE_GAP_X, y:baseY+row*sg };
    });
  });
  // Solo
  { const baseY=TOP_OFFSET+(maxNT+1)*TIER_GAP_Y+20, tc=Math.ceil(soloNodes.length/soloRows);
    soloNodes.forEach((id,i)=>{
      const col=Math.floor(i/soloRows), row=i%soloRows;
      posMap[id]={ x:-(tc-1)*NODE_GAP_X/2+col*NODE_GAP_X, y:baseY+row*SOLO_ROW_GAP };
    }); }
  return posMap;
}

/* ══════════════════════════════════════════════════════
   Cytoscape 스타일
══════════════════════════════════════════════════════ */
function getCyStyle() {
  const D = isDark;
  return [
    { selector:'node', style:{
      label:'data(label)', 'font-size':'9px', 'font-weight':'bold',
      width:'44px', height:'44px',
      'background-color':D?'#2a2a3a':'#c0c4d8',
      color:D?'#aab':'#334',
      'text-valign':'bottom','text-halign':'center','text-margin-y':'6px',
      'text-wrap':'wrap','text-max-width':'70px',
      'border-width':2,'border-color':D?'#556':'#9aa',
    }},
    { selector:'node[tier=0]', style:{'background-color':D?'#1a4a7a':'#b8d4f0','border-color':'#3498db'}},
    { selector:'node[tier=1]', style:{'background-color':D?'#3d1a5e':'#d8bef0','border-color':'#9b59b6'}},
    { selector:'node[tier=2]', style:{'background-color':D?'#1a3a3a':'#b0e8de','border-color':'#1abc9c'}},
    { selector:'node[tier=3]', style:{'background-color':D?'#1a3a2a':'#b0e0c0','border-color':'#27ae60'}},
    { selector:'node[tier=5]', style:{'background-color':D?'#3a1a1a':'#f0c0c0','border-color':'#e74c3c'}},
    { selector:'node[?is_powered]', style:{
      'background-color':D?'#145a20':'#c8f0cc','border-color':'#2ecc40',color:D?'#7dff8a':'#1a6e22'
    }},
    { selector:'node[?is_powered][tier=0]', style:{
      'background-color':D?'#0e3460':'#a8c8f0','border-color':'#3498db',color:D?'#7bc8ff':'#0a4080'
    }},
    { selector:'node[?is_powered][tier=1]', style:{
      'background-color':D?'#2d0e50':'#d0a8f0','border-color':'#9b59b6',color:D?'#cc88ff':'#4a1a7a'
    }},
    { selector:'node[?is_powered][tier=2]', style:{
      'background-color':D?'#0e3030':'#90e0d4','border-color':'#1abc9c',color:D?'#7fffee':'#0a4040'
    }},
    { selector:'node[is_breaker_closed=0]', style:{
      'background-color':D?'#5a0000':'#ffd0d0','border-color':'#ff4136','border-width':3,
      color:D?'#ff8888':'#aa0000',
    }},
    /* 현재 탐색 중심 포커스 */
    { selector:'node[?is_focus]', style:{
      'border-width':4,'border-color':'#f1c40f',
      width:'54px', height:'54px',
      'font-size':'10px','font-weight':'bold','z-index':10,
    }},
    /* 숨김 */
    { selector:'node[?is_hidden]', style:{ opacity:0, 'events':'no' }},
    /* 간선 */
    { selector:'edge', style:{
      width:1.5,'line-color':D?'#3a3a55':'#bbb',
      'target-arrow-shape':'triangle','target-arrow-color':D?'#3a3a55':'#bbb',
      'curve-style':'bezier', opacity:0.6,
    }},
    { selector:'edge[?is_live]', style:{
      width:3,'line-color':'#2ecc40','target-arrow-color':'#2ecc40',opacity:1,
    }},
    { selector:'edge[?is_hidden]', style:{ opacity:0, 'events':'no' }},
    { selector:'node:active', style:{'overlay-opacity':0.1}},
  ];
}

function applyCyTheme() {
  if (!cy) return;
  cy.style(getCyStyle());
  cy.container().style.background = isDark ? '#0f0f1a' : '#f0f2f8';
}

/* ══════════════════════════════════════════════════════
   검색 패널
══════════════════════════════════════════════════════ */
function initSearch() {
  const inp  = document.getElementById('search-input');
  const clr  = document.getElementById('search-clear');
  const drop = document.getElementById('search-dropdown');
  const allIds = rawElements.nodes.map(n => n.data.id);

  function renderDrop(q) {
    drop.innerHTML = '';
    if (!q) { drop.style.display='none'; return; }

    const matches = allIds.filter(id => id.toLowerCase().includes(q.toLowerCase()));
    if (!matches.length) {
      drop.innerHTML = '<div class="dd-hint">검색 결과 없음</div>';
      drop.style.display='block';
      return;
    }
    drop.style.display='block';
    matches.slice(0,50).forEach(id => {
      const d    = rawElements.nodes.find(n => n.data.id===id)?.data;
      const tier = d?.tier ?? 4;
      const item = document.createElement('div');
      item.className='dd-item';

      const lbl=document.createElement('span');
      lbl.className='dd-label'; lbl.textContent=id;

      const badge=document.createElement('span');
      badge.className='dd-badge';
      badge.style.borderLeft=`3px solid ${TIER_INFO[tier]?.color||'#aaa'}`;
      badge.textContent=TIER_INFO[tier]?.label||`T${tier}`;

      item.appendChild(lbl); item.appendChild(badge);
      item.addEventListener('click', () => {
        inp.value=''; clr.style.display='none'; drop.style.display='none';
        expandFromNode(id, true);
        inp.focus();
      });
      drop.appendChild(item);
    });
    if (matches.length>50) {
      const m=document.createElement('div');
      m.className='dd-hint';
      m.textContent=`외 ${matches.length-50}개 더…`;
      drop.appendChild(m);
    }
  }

  inp.addEventListener('input', ()=>{ const q=inp.value.trim(); clr.style.display=q?'block':'none'; renderDrop(q); });
  inp.addEventListener('focus', ()=> renderDrop(inp.value.trim()));
  clr.addEventListener('click', ()=>{ inp.value=''; clr.style.display='none'; drop.style.display='none'; inp.focus(); });
  inp.addEventListener('keydown', e=>{
    if (e.key==='Enter') {
      const q=inp.value.trim(); if(!q) return;
      const match=allIds.find(id=>id.toLowerCase().includes(q.toLowerCase()));
      if (match) { inp.value=''; clr.style.display='none'; drop.style.display='none'; expandFromNode(match,true); }
    }
    if (e.key==='Escape') drop.style.display='none';
  });
  document.addEventListener('click', e=>{
    if (!document.getElementById('list-panel').contains(e.target)) drop.style.display='none';
  });
}
