<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1923" />
  <meta name="description" content="전기 계통 파워트리 조회 시스템" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>⚡ Power Tree</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <!-- D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ── 좌측 사이드바 ── -->
  <aside id="sidebar">
    <!-- 항상 표시되는 토글 버튼 -->
    <button id="sidebar-toggle" onclick="toggleSidebar()" title="검색창 열기/닫기">☰</button>

    <!-- 축소 시 숨겨지는 영역 -->
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <div class="sidebar-title">
          <h1>Power Tree</h1>
          <span class="version">V4.8</span>
        </div>
        <button id="btn-reset" onclick="resetTree()" title="초기화">↺</button>
      </div>

      <div class="search-box">
        <div class="search-row">
          <input
            type="text"
            id="searchInput"
            placeholder="장비 Tag 검색 (예: MCC, EDB...)"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="btn-orientation" onclick="toggleOrientationLock()" title="세로 고정 (탭하여 해제)">🔒</button>
        </div>
      </div>

      <ul id="resultList"></ul>

      <div id="status"></div>
    </div>
  </aside>

  <!-- 사이드바 너비 조절 핸들 -->
  <div id="sidebar-resize"></div>

  <!-- ── 우측 캔버스 ── -->
  <main id="canvas-container">

    <!-- 초기 안내 -->
    <div id="hint">
      <div class="hint-icon">🔌</div>
      <p>왼쪽 검색창에서 장비를 선택하면<br>파워트리가 표시됩니다</p>
      <p style="margin-top:8px;font-size:10px;opacity:.6">
        단클릭/탭: 정보 표시 &nbsp;|&nbsp; 더블클릭/더블탭: 확장<br>
        롱프레스: 선택장비+확장 &nbsp;|&nbsp; 드래그: 이동
      </p>
    </div>

    <!-- SVG 캔버스 -->
    <svg id="tree-svg"></svg>

    <!-- 범례 -->
    <div id="legend">
      <div class="leg-row"><div class="leg-box leg-from"></div> 공급원 (From)</div>
      <div class="leg-row"><div class="leg-box leg-center"></div> 선택 장비</div>
      <div class="leg-row"><div class="leg-box leg-to"></div> 부하 (To)</div>
      <div class="leg-row"><div class="leg-box leg-mutual"></div> 상호 공급</div>
    </div>

    <!-- 줌 툴바 + 열 수 조절 (통합) -->
    <div id="toolbar">
      <button title="줌 인"  onclick="zoomIn()">＋</button>
      <button title="줌 아웃" onclick="zoomOut()">－</button>
      <button title="화면 맞춤" onclick="zoomFit()">⊙</button>
      <button title="자동 정렬" onclick="autoLayout()" id="btn-layout">⊞</button>
      <span class="toolbar-sep"></span>
      <span class="col-label">열</span>
      <button title="열 줄이기" onclick="changeColCount(-2)">▼</button>
      <span id="col-count">4</span>
      <button title="열 늘리기" onclick="changeColCount(2)">▲</button>
    </div>

  </main>

</div>

<!-- 노드 정보 툴팁 (body 직속 → #app overflow:hidden 영향 없음) -->
<div id="node-tooltip" class="node-tooltip" style="display:none">
  <div class="tooltip-header">
    <span id="modal-tag"></span>
    <button class="tooltip-close" onclick="closeNodeModal()">✕</button>
  </div>
  <div id="modal-body"></div>
</div>

<!--
  ★ 로딩 순서 중요:
  1. api.js  → powerData 전역 변수 선언 + 데이터 로드
  2. tree-viz.js → powerData 사용 (drawTree 함수 정의)
-->
<script src="api.js"></script>
<script src="tree-viz.js"></script>

<script>
  // ── PWA 서비스 워커 등록 ──────────────────────────
  if ('serviceWorker' in navigator) {
    // updateViaCache:'none' → 브라우저 HTTP 캐시 무시하고 sw.js 항상 새로 확인
    navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
      .catch(err => console.warn('SW 등록 실패:', err));
    // 새 SW 활성화 시 자동 리로드 → 항상 최신 버전 표시
    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data && event.data.type === 'SW_UPDATED') window.location.reload();
    });
  }

  // ── 툴바 줌 제어 (svgZoom은 tree-viz.js 전역 변수) ──────────
  function zoomIn() {
    if (!svgZoom) return;
    d3.select("#tree-svg").transition().duration(250)
      .call(svgZoom.scaleBy, 1.4);
  }

  function zoomOut() {
    if (!svgZoom) return;
    d3.select("#tree-svg").transition().duration(250)
      .call(svgZoom.scaleBy, 0.7);
  }

  function zoomFit() {
    if (!svgZoom) return;
    const svg  = d3.select("#tree-svg");
    const g    = svg.select("#main-g");
    if (g.empty()) return;
    const svgEl = document.getElementById("tree-svg");
    const W = svgEl.clientWidth, H = svgEl.clientHeight;
    try {
      const bbox = g.node().getBBox();
      if (!bbox.width || !bbox.height) return;
      const scale = Math.min(0.9 * W / bbox.width, 0.9 * H / bbox.height, 1.5);
      const tx = W / 2 - scale * (bbox.x + bbox.width  / 2);
      const ty = H / 2 - scale * (bbox.y + bbox.height / 2);
      svg.transition().duration(400)
        .call(svgZoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    } catch (e) { /* 무시 */ }
  }

  // ── 창 크기 변경 시 트리 재렌더 ──────────────────────
  (function () {
    let resizeTimer = null;
    const container = document.getElementById("canvas-container");
    const observer = new ResizeObserver(() => {
      if (!resizeTimer) {
        resizeTimer = setTimeout(() => {
          resizeTimer = null;
          if (typeof zoomFit === "function") zoomFit();
        }, 200);
      }
    });
    observer.observe(container);
  })();

  // ── 화면 회전 잠금 ───────────────────────────────────
  let orientationLocked = true;

  function updateOrientationBtn() {
    const btn = document.getElementById('btn-orientation');
    if (!btn) return;
    if (orientationLocked) {
      btn.textContent = '🔒';
      btn.title = '세로 고정 중 — 탭하면 회전 허용';
      btn.classList.add('orient-locked');
      btn.classList.remove('orient-free');
    } else {
      btn.textContent = '🔄';
      btn.title = '회전 자유 — 탭하면 세로 고정';
      btn.classList.add('orient-free');
      btn.classList.remove('orient-locked');
    }
  }

  function applyOrientationTransform() {
    const app = document.getElementById('app');
    if (!app) return;
    const W = window.innerWidth;
    const H = window.innerHeight;

    if (orientationLocked && W > H) {
      // 기기가 어느 방향으로 돌아갔는지 감지해 보정 방향 결정
      const angle = (screen.orientation && screen.orientation.angle != null)
        ? screen.orientation.angle
        : (window.orientation || 0);
      // angle=270(-90): 시계방향 회전 → +90도 보정
      // angle=90: 반시계방향 회전 → -90도 보정
      const rotDeg = (angle === 270 || angle === -90) ? 90 : -90;

      app.style.position        = 'fixed';
      app.style.width           = H + 'px';
      app.style.height          = W + 'px';
      app.style.left            = ((W - H) / 2) + 'px';
      app.style.top             = ((H - W) / 2) + 'px';
      app.style.transformOrigin = '50% 50%';
      app.style.transform       = 'rotate(' + rotDeg + 'deg)';
      app.style.overflow        = 'hidden';
    } else {
      app.style.cssText = '';
    }
  }

  function toggleOrientationLock() {
    orientationLocked = !orientationLocked;
    updateOrientationBtn();
    applyOrientationTransform();
  }

  // 회전 감지 — 여러 이벤트로 중복 등록해 누락 방지
  window.addEventListener('resize', applyOrientationTransform);
  window.addEventListener('orientationchange', function() {
    setTimeout(applyOrientationTransform, 50);
    setTimeout(applyOrientationTransform, 200);
  });
  if (screen.orientation) {
    screen.orientation.addEventListener('change', function() {
      setTimeout(applyOrientationTransform, 50);
      setTimeout(applyOrientationTransform, 200);
    });
  }

  window.addEventListener('load', () => {
    updateOrientationBtn();
    applyOrientationTransform();
  });
  });

  // ── 사이드바 너비 드래그 조절 ────────────────────────
  (function () {
    const sb     = document.getElementById("sidebar");
    const handle = document.getElementById("sidebar-resize");
    let dragging = false, startX = 0, startW = 0;

    handle.addEventListener("mousedown", e => {
      if (sb.classList.contains("collapsed")) return;
      dragging = true;
      startX   = e.clientX;
      startW   = sb.offsetWidth;
      sb.classList.add("resizing");
      handle.classList.add("active");
      document.body.style.cursor     = "col-resize";
      document.body.style.userSelect = "none";
      e.preventDefault();
    });

    document.addEventListener("mousemove", e => {
      if (!dragging) return;
      const newW = Math.max(180, Math.min(560, startW + e.clientX - startX));
      sb.style.width    = newW + "px";
      sb.style.minWidth = newW + "px";
    });

    document.addEventListener("mouseup", () => {
      if (!dragging) return;
      dragging = false;
      sb.classList.remove("resizing");
      handle.classList.remove("active");
      document.body.style.cursor     = "";
      document.body.style.userSelect = "";
      if (typeof zoomFit === "function") zoomFit();
    });
  })();
</script>

</body>
</html>
